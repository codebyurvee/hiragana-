<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiragana Word Reading</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #17171a;
    --border: #2a2a30;
    --dim: #3a3a44;
    --muted: #6b6b80;
    --text: #e8e8f0;
    --soft: #b0b0c8;
    --accent: #e8a838;
    --green: #4caf7d;
    --red: #e05252;
    --blue: #5b8dee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 60px;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    margin-bottom: 52px;
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.6rem;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }

  h1 span {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 100;
    color: var(--accent);
  }

  .sub {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.2em;
  }

  /* Category tabs */
  .cats {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
  }

  .cat-btn {
    padding: 7px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    transition: all 0.15s;
  }

  .cat-btn:hover { border-color: var(--dim); color: var(--soft); }
  .cat-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,168,56,0.07); }

  /* Main card */
  .card-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
  }

  .word-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 48px 40px 40px;
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .word-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .category-tag {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .word-number {
    position: absolute;
    top: 16px;
    left: 20px;
    font-size: 0.6rem;
    color: var(--dim);
  }

  .word-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 100;
    font-size: 5rem;
    letter-spacing: 0.15em;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 12px;
    transition: all 0.3s;
  }

  /* Character-by-character highlight */
  .word-jp .char {
    display: inline-block;
    transition: color 0.2s, transform 0.2s;
    position: relative;
  }

  .word-jp .char.lit {
    color: var(--accent);
    transform: translateY(-4px);
  }

  .reading-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
    min-height: 32px;
    align-items: center;
  }

  .reading-char {
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    transition: color 0.2s, opacity 0.3s;
    opacity: 0;
    min-width: 28px;
    text-align: center;
  }

  .reading-char.shown { opacity: 1; color: var(--accent); }
  .reading-char.full { color: var(--soft); }

  .meaning {
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
    font-family: 'DM Serif Display', serif;
    opacity: 0;
    transition: opacity 0.4s;
    margin-top: 4px;
  }

  .meaning.shown { opacity: 1; color: var(--soft); }

  /* Reveal controls */
  .reveal-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .reveal-btn {
    padding: 10px 22px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .reveal-btn:hover { border-color: var(--accent); color: var(--accent); }
  .reveal-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 500;
  }
  .reveal-btn.primary:hover { background: #d4952e; border-color: #d4952e; }

  /* Navigation */
  .nav-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .nav-btn {
    padding: 10px 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--soft);
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .nav-btn:hover { border-color: var(--dim); background: var(--dim); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Progress */
  .progress-section {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  /* Self-rate buttons */
  .rate-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .rate-row.shown { opacity: 1; pointer-events: all; }

  .rate-lbl {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 10px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .rate-lbl.shown { opacity: 1; }

  .rate-btn {
    padding: 9px 20px;
    border-radius: 2px;
    border: 1px solid;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.15s;
    background: transparent;
  }

  .rate-btn.easy { border-color: var(--green); color: var(--green); }
  .rate-btn.easy:hover { background: rgba(76,175,125,0.12); }
  .rate-btn.hard { border-color: var(--red); color: var(--red); }
  .rate-btn.hard:hover { background: rgba(224,82,82,0.12); }
  .rate-btn.ok { border-color: var(--blue); color: var(--blue); }
  .rate-btn.ok:hover { background: rgba(91,141,238,0.12); }

  /* Stats strip */
  .stats {
    display: flex;
    gap: 32px;
    justify-content: center;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  .stat {
    text-align: center;
  }

  .stat-val {
    font-size: 1.6rem;
    font-family: 'DM Serif Display', serif;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-val.easy-c { color: var(--green); }
  .stat-val.ok-c { color: var(--blue); }
  .stat-val.hard-c { color: var(--red); }

  .stat-lbl {
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Animate in */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .word-card { animation: slideUp 0.4s ease; }

  .speak-btn {
    position: absolute;
    bottom: 16px;
    left: 20px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--dim);
    font-size: 1rem;
    transition: color 0.15s;
    padding: 4px;
  }
  .speak-btn:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Reading Practice</div>
  <h1>Read <span>ひらがな</span> Words</h1>
  <div class="sub">See the word · reveal reading · rate yourself</div>
</header>

<div class="cats" id="cats"></div>

<div class="card-wrap">
  <div class="word-card" id="word-card">
    <span class="word-number" id="word-number">1 / 10</span>
    <span class="category-tag" id="cat-tag">—</span>
    <div class="word-jp" id="word-jp"></div>
    <div class="reading-row" id="reading-row"></div>
    <div class="meaning" id="meaning"></div>
    <button class="speak-btn" id="speak-btn" title="Listen" onclick="speakCurrent()">🔊</button>
  </div>

  <div class="reveal-row">
    <button class="reveal-btn" id="reveal-char-btn" onclick="revealNext()">Reveal next →</button>
    <button class="reveal-btn primary" id="reveal-all-btn" onclick="revealAll()">Show all</button>
  </div>

  <div class="rate-lbl" id="rate-lbl">How well did you read it?</div>
  <div class="rate-row" id="rate-row">
    <button class="rate-btn hard" onclick="rate('hard')">✗ Missed</button>
    <button class="rate-btn ok" onclick="rate('ok')">~ Close</button>
    <button class="rate-btn easy" onclick="rate('easy')">✓ Got it</button>
  </div>
</div>

<div class="progress-section">
  <div class="progress-info">
    <span id="prog-label">Progress</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="nav-row">
    <button class="nav-btn" id="prev-btn" onclick="go(-1)">← Prev</button>
    <button class="nav-btn" id="next-btn" onclick="go(1)">Next →</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val easy-c" id="s-easy">0</div><div class="stat-lbl">Got it</div></div>
  <div class="stat"><div class="stat-val ok-c" id="s-ok">0</div><div class="stat-lbl">Close</div></div>
  <div class="stat"><div class="stat-val hard-c" id="s-hard">0</div><div class="stat-lbl">Missed</div></div>
</div>

<script>
const words = [
  // Everyday objects
  { jp: 'ねこ', reading: ['ne','ko'], meaning: 'cat', cat: 'Animals' },
  { jp: 'いぬ', reading: ['i','nu'], meaning: 'dog', cat: 'Animals' },
  { jp: 'とり', reading: ['to','ri'], meaning: 'bird', cat: 'Animals' },
  { jp: 'さかな', reading: ['sa','ka','na'], meaning: 'fish', cat: 'Animals' },
  { jp: 'うさぎ', reading: ['u','sa','gi'], meaning: 'rabbit', cat: 'Animals' },
  { jp: 'くま', reading: ['ku','ma'], meaning: 'bear', cat: 'Animals' },
  // Food
  { jp: 'すし', reading: ['su','shi'], meaning: 'sushi', cat: 'Food' },
  { jp: 'みず', reading: ['mi','zu'], meaning: 'water', cat: 'Food' },
  { jp: 'おちゃ', reading: ['o','cha'], meaning: 'tea', cat: 'Food' },
  { jp: 'ごはん', reading: ['go','ha','n'], meaning: 'rice / meal', cat: 'Food' },
  { jp: 'たまご', reading: ['ta','ma','go'], meaning: 'egg', cat: 'Food' },
  { jp: 'パン', reading: ['pa','n'], meaning: 'bread', cat: 'Food' },
  { jp: 'くだもの', reading: ['ku','da','mo','no'], meaning: 'fruit', cat: 'Food' },
  { jp: 'やさい', reading: ['ya','sa','i'], meaning: 'vegetables', cat: 'Food' },
  // Nature
  { jp: 'そら', reading: ['so','ra'], meaning: 'sky', cat: 'Nature' },
  { jp: 'うみ', reading: ['u','mi'], meaning: 'sea / ocean', cat: 'Nature' },
  { jp: 'やま', reading: ['ya','ma'], meaning: 'mountain', cat: 'Nature' },
  { jp: 'かわ', reading: ['ka','wa'], meaning: 'river', cat: 'Nature' },
  { jp: 'はな', reading: ['ha','na'], meaning: 'flower', cat: 'Nature' },
  { jp: 'きせつ', reading: ['ki','se','tsu'], meaning: 'season', cat: 'Nature' },
  // People & body
  { jp: 'ひと', reading: ['hi','to'], meaning: 'person', cat: 'People' },
  { jp: 'こども', reading: ['ko','do','mo'], meaning: 'child', cat: 'People' },
  { jp: 'おとこ', reading: ['o','to','ko'], meaning: 'man', cat: 'People' },
  { jp: 'おんな', reading: ['o','n','na'], meaning: 'woman', cat: 'People' },
  { jp: 'かお', reading: ['ka','o'], meaning: 'face', cat: 'People' },
  { jp: 'て', reading: ['te'], meaning: 'hand', cat: 'People' },
  { jp: 'め', reading: ['me'], meaning: 'eye', cat: 'People' },
  // Places
  { jp: 'いえ', reading: ['i','e'], meaning: 'house / home', cat: 'Places' },
  { jp: 'まち', reading: ['ma','chi'], meaning: 'town', cat: 'Places' },
  { jp: 'みせ', reading: ['mi','se'], meaning: 'shop / store', cat: 'Places' },
  { jp: 'がっこう', reading: ['ga','k','ko','u'], meaning: 'school', cat: 'Places' },
  { jp: 'えき', reading: ['e','ki'], meaning: 'station', cat: 'Places' },
  // Common words
  { jp: 'きょう', reading: ['kyo','u'], meaning: 'today', cat: 'Time' },
  { jp: 'あした', reading: ['a','shi','ta'], meaning: 'tomorrow', cat: 'Time' },
  { jp: 'きのう', reading: ['ki','no','u'], meaning: 'yesterday', cat: 'Time' },
  { jp: 'いま', reading: ['i','ma'], meaning: 'now', cat: 'Time' },
  { jp: 'まいにち', reading: ['ma','i','ni','chi'], meaning: 'every day', cat: 'Time' },
  // Verbs / actions
  { jp: 'たべる', reading: ['ta','be','ru'], meaning: 'to eat', cat: 'Verbs' },
  { jp: 'のむ', reading: ['no','mu'], meaning: 'to drink', cat: 'Verbs' },
  { jp: 'みる', reading: ['mi','ru'], meaning: 'to see / watch', cat: 'Verbs' },
  { jp: 'きく', reading: ['ki','ku'], meaning: 'to listen', cat: 'Verbs' },
  { jp: 'いく', reading: ['i','ku'], meaning: 'to go', cat: 'Verbs' },
  { jp: 'くる', reading: ['ku','ru'], meaning: 'to come', cat: 'Verbs' },
  { jp: 'よむ', reading: ['yo','mu'], meaning: 'to read', cat: 'Verbs' },
  { jp: 'かく', reading: ['ka','ku'], meaning: 'to write', cat: 'Verbs' },
];

const categories = ['All', ...new Set(words.map(w => w.cat))];
let currentCat = 'All';
let filtered = [];
let idx = 0;
let revealed = 0; // how many chars revealed
let fullRevealed = false;
let ratings = {}; // word idx → 'easy'|'ok'|'hard'
let stats = { easy: 0, ok: 0, hard: 0 };

// Build category buttons
const catsEl = document.getElementById('cats');
categories.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (c === 'All' ? ' active' : '');
  btn.textContent = c;
  btn.onclick = () => {
    currentCat = c;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtered = currentCat === 'All' ? [...words] : words.filter(w => w.cat === currentCat);
    idx = 0; ratings = {}; stats = { easy: 0, ok: 0, hard: 0 };
    updateStats();
    render();
  };
  catsEl.appendChild(btn);
});

filtered = [...words];
render();

function render() {
  if (!filtered.length) return;
  const w = filtered[idx];
  revealed = 0;
  fullRevealed = false;

  // Word number
  document.getElementById('word-number').textContent = `${idx + 1} / ${filtered.length}`;
  document.getElementById('cat-tag').textContent = w.cat;

  // Build char spans
  const jpEl = document.getElementById('word-jp');
  jpEl.innerHTML = '';
  [...w.jp].forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'char';
    span.textContent = ch;
    span.dataset.i = i;
    jpEl.appendChild(span);
  });

  // Reading slots
  const rr = document.getElementById('reading-row');
  rr.innerHTML = '';
  w.reading.forEach(r => {
    const span = document.createElement('span');
    span.className = 'reading-char';
    span.textContent = r;
    rr.appendChild(span);
  });

  // Meaning
  const m = document.getElementById('meaning');
  m.textContent = w.meaning;
  m.className = 'meaning';

  // Rate row
  document.getElementById('rate-row').className = 'rate-row';
  document.getElementById('rate-lbl').className = 'rate-lbl';

  // Nav buttons
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === filtered.length - 1;

  // Progress
  const done = Object.keys(ratings).length;
  const pct = Math.round((done / filtered.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';

  // Reveal buttons
  document.getElementById('reveal-char-btn').style.display = '';
  document.getElementById('reveal-all-btn').style.display = '';
}

function revealNext() {
  if (fullRevealed) return;
  const rr = document.getElementById('reading-row');
  const chars = rr.querySelectorAll('.reading-char');
  const jpChars = document.getElementById('word-jp').querySelectorAll('.char');

  if (revealed < chars.length) {
    chars[revealed].classList.add('shown');
    // Light up corresponding jp char(s)
    // roughly map reading index to jp char index
    if (jpChars[revealed]) jpChars[revealed].classList.add('lit');
    revealed++;
  }

  if (revealed >= chars.length) {
    fullRevealed = true;
    revealAll();
  }
}

function revealAll() {
  fullRevealed = true;
  const rr = document.getElementById('reading-row');
  rr.querySelectorAll('.reading-char').forEach(c => {
    c.classList.add('shown');
    c.classList.add('full');
  });
  document.getElementById('word-jp').querySelectorAll('.char').forEach(c => c.classList.remove('lit'));
  document.getElementById('meaning').classList.add('shown');
  document.getElementById('rate-row').classList.add('shown');
  document.getElementById('rate-lbl').classList.add('shown');
}

function rate(r) {
  const prev = ratings[idx];
  if (prev) stats[prev]--;
  ratings[idx] = r;
  stats[r]++;
  updateStats();

  // Auto-advance after short delay
  setTimeout(() => {
    if (idx < filtered.length - 1) go(1);
  }, 380);
}

function go(dir) {
  idx = Math.max(0, Math.min(filtered.length - 1, idx + dir));
  render();
}

function updateStats() {
  document.getElementById('s-easy').textContent = stats.easy;
  document.getElementById('s-ok').textContent = stats.ok;
  document.getElementById('s-hard').textContent = stats.hard;
}

function speakCurrent() {
  if (!filtered.length) return;
  const w = filtered[idx];
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(w.jp);
    u.lang = 'ja-JP';
    u.rate = 0.75;
    speechSynthesis.speak(u);
  }
}
</script>
</body>
</html>
